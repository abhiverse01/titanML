<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TitanML - AI Knowledge Nexus</title>
    
    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="An interactive knowledge graph and visual encyclopedia for AI concepts, created by Abhishek Shah.">
    <meta name="keywords" content="AI, Machine Learning, Knowledge Graph, RAG, LLM, Agentic AI, Abhishek Shah">
    <meta name="author" content="Abhishek Shah">
    
    <!-- Open Graph / Social Cards -->
    <meta property="og:title" content="TitanML - AI Knowledge Nexus">
    <meta property="og:description" content="Interactive visual encyclopedia of AI concepts, terms, and relationships.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://abhiverse01.github.io">
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/23054200?v=4">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Preload JS for faster startup -->
    <link rel="preload" href="js/data.js" as="script">
    <link rel="preload" href="js/graph.js" as="script">
    <link rel="preload" href="js/app.js" as="script">

    <!-- Inline styles for Loader, Footer, and Dark Mode -->
    <style>
        /* Loader */
        #initial-loader {
            position: fixed;
            inset: 0;
            background: var(--bg-primary, #f8fafc);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #initial-loader.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner {
            width: 40px; height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #0891b2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-light, #e2e8f0);
            background: var(--bg-secondary, #ffffff);
            margin-top: auto;
        }
        .creator-card { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .creator-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #0891b2, #6366f1); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
        .creator-info h4 { font-size: 13px; font-weight: 600; color: var(--text-primary, #0f172a); margin: 0; }
        .creator-info p { font-size: 11px; color: var(--text-muted, #94a3b8); margin: 2px 0 0 0; }
        .creator-links { display: flex; gap: 8px; margin-bottom: 12px; }
        .creator-link { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; background: var(--bg-tertiary, #f1f5f9); border-radius: 8px; text-decoration: none; color: var(--text-secondary, #475569); font-size: 11px; font-weight: 500; transition: all 0.2s ease; }
        .creator-link:hover { background: var(--bg-active, #e2e8f0); color: var(--accent-primary, #0891b2); transform: translateY(-1px); }
        .creator-link svg { width: 14px; height: 14px; }
        .copyright-text { text-align: center; font-size: 10px; color: var(--text-muted, #94a3b8); opacity: 0.7; }

        /* Desktop view note */
        #desktopNote { 
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: #0891b2; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px;
            padding: 6px 12px; border-radius: 6px; opacity: 0.85; z-index: 9999; display: none; 
        }
    </style>
</head>
<body>

    <!-- Initial Loader -->
    <div id="initial-loader">
        <div class="loader-spinner"></div>
        <p id="loaderText" style="margin-top:16px;color:#64748b;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;">Initializing Knowledge Base... 🧠</p>
    </div>

    <!-- Desktop Note -->
    <div id="desktopNote">⚡ For the best experience, view TitanML on desktop</div>

    <!-- Main App Wrapper -->
    <div id="app" class="app">
        <!-- Header, Sidebar, Content, Panels, Modals remain exactly as in your original index.html -->
        <!-- Add Dark Mode Toggle in Footer -->
        <div class="sidebar-footer">
            <button id="themeToggle" style="font-size:11px;padding:4px 8px;margin-top:6px;">🌙 Dark Mode</button>
        </div>
    </div>

    <!-- SCRIPT LOADER -->
    <script>
        console.log("%c🚀 TitanML Booting...", "color: #0891b2; font-weight: bold; font-size:14px;");
        console.log("%c👋 Created by Abhishek Shah | https://abhiverse01.github.io", "color:#6366f1; font-size:12px;");

        // Show desktop note for mobile users
        if (window.innerWidth < 768) document.getElementById('desktopNote').style.display = 'block';

        // Loader emoji rotation
        const emojis = ["🧠","🤖","💡","⚡"];
        let i = 0;
        setInterval(() => {
            document.getElementById('loaderText').textContent = `Initializing Knowledge Base... ${emojis[i]}`;
            i = (i + 1) % emojis.length;
        }, 800);

        // Dark mode toggle
        const root = document.documentElement;
        document.getElementById('themeToggle').onclick = () => {
            if(root.style.getPropertyValue('--bg-primary') === '#f8fafc'){
                root.style.setProperty('--bg-primary','#0f172a');
                root.style.setProperty('--bg-secondary','#1e293b');
                root.style.setProperty('--text-primary','#f8fafc');
            } else {
                root.style.setProperty('--bg-primary','#f8fafc');
                root.style.setProperty('--bg-secondary','#ffffff');
                root.style.setProperty('--text-primary','#0f172a');
            }
        };

        // Load JS scripts sequentially
        function loadScript(src, callback){
            const s = document.createElement('script'); s.src=src;
            s.onload=()=>{console.log(`✅ Loaded ${src}`); callback(false);}
            s.onerror=()=>{console.error(`❌ Could not load ${src}`); alert(`Error loading ${src}`); callback(true);}
            document.body.appendChild(s);
        }

        loadScript("js/data.js", (err)=>{ if(err) return; 
            loadScript("js/graph.js", (err)=>{ if(err) return; 
                loadScript("js/app.js", (err)=>{ if(err) return; 
                    setTimeout(()=>{ 
                        const loader = document.getElementById('initial-loader');
                        if(window.app && window.app.initialized){ 
                            console.log("🚀 App is running."); 
                            if(loader) loader.classList.add('hidden'); 
                        } else { console.error("❌ App failed to initialize."); }
                    }, 500);
                });
            });
        });

        // Keyboard shortcut '/' focuses search
        document.addEventListener('keydown', (e)=>{
            if(e.key === '/' && !e.ctrlKey && !e.metaKey){
                e.preventDefault();
                const search = document.getElementById('searchInput');
                if(search) search.focus();
            }
        });
    </script>

</body>
</html>
